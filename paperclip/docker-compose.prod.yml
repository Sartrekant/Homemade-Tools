# Paperclip — production / client hosting
# External postgres, authenticated mode, public URL required.
#
# Usage:
#   cp .env.example .env   # fill in all required values
#   docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
      POSTGRES_DB: paperclip
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    pull_policy: always
    ports:
      - "${PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_HOME: "/paperclip"
      DATABASE_URL: "postgres://paperclip:${POSTGRES_PASSWORD}@db:5432/paperclip"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:?PAPERCLIP_PUBLIC_URL must be set, e.g. https://paperclip.yourdomain.com}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  paperclip-data:
